    <script>
      // Dynamically set meta tags and schema for SEO
      document.addEventListener('DOMContentLoaded', function() {
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        if (!id || !window.ACTIVITIES) return;
        const game = window.ACTIVITIES.find(a => a.id === id);
        if (!game) return;
        // Title & meta description
        document.title = `${game.title} – Play Unblocked | ScienceLab`;
        let metaDesc = document.querySelector('meta[name="description"]');
        if (metaDesc) metaDesc.setAttribute('content', `${game.title}: ${game.description.replace(/<[^>]+>/g, '').slice(0, 140)}`);
        // Open Graph & Twitter
        document.querySelector('meta[property="og:title"]').setAttribute('content', `${game.title} – Play Unblocked | ScienceLab`);
        document.querySelector('meta[property="og:description"]').setAttribute('content', `${game.title}: ${game.description.replace(/<[^>]+>/g, '').slice(0, 140)}`);
        document.querySelector('meta[property="og:url"]').setAttribute('content', window.location.href);
        document.querySelector('meta[name="twitter:title"]').setAttribute('content', `${game.title} – Play Unblocked | ScienceLab`);
        document.querySelector('meta[name="twitter:description"]').setAttribute('content', `${game.title}: ${game.description.replace(/<[^>]+>/g, '').slice(0, 140)}`);
        // Set canonical to SEO-friendly path (no query string)
        const canonicalUrl = `https://sciencelab.app/${game.id}`;
        document.querySelector('link[rel="canonical"]').setAttribute('href', canonicalUrl);
        // JSON-LD schema
        const schema = {
          "@context": "https://schema.org",
          "@type": "VideoGame",
          "name": game.title,
          "description": game.description.replace(/<[^>]+>/g, ''),
          "applicationCategory": game.category,
          "url": window.location.href,
          "image": window.location.origin + '/assets/Logo.png',
          "author": { "@type": "Organization", "name": "ScienceLab" }
        };
        document.getElementById('jsonld-schema').textContent = JSON.stringify(schema);
      });
    </script>
</head>
